version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: campusflow
      POSTGRES_USER: campusflow
      POSTGRES_PASSWORD: campusflow
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  backend:
    build: ./backend/campusflow
    env_file: .env
    volumes:
      - ./backend/campusflow:/app
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
  frontend:
    image: node:20
    working_dir: /workspace
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/workspace
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
