spring:
  application:
    name: campusflow
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/campusflow}
    username: ${DB_USER:campusflow}
    password: ${DB_PASSWORD:campusflow}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  level:
    root: INFO
    '[org.springframework.security]': INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:*}
  jwt:
    issuer: campusflow
    access-token-ttl: 15m
    refresh-token-ttl: 7d
